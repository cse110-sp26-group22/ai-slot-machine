<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODEL COLLAPSE: The AI Token Burner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MODEL COLLAPSE</h1>
            <p class="subtitle">The Autonomous Token Burner & Probabilistic Hallucinator</p>
        </header>

        <main>
            <div class="status-panel">
                <div class="stat-box">
                    <span class="label">COMPUTE CREDITS</span>
                    <span id="credit-balance" class="value">50,000</span>
                </div>
                <div class="stat-box">
                    <span class="label">COST PER INFERENCE</span>
                    <span class="value">1,000</span>
                </div>
            </div>

            <div class="slot-machine">
                <div class="reels">
                    <div class="reel" id="reel1">
                        <div class="reel-inner">🤖</div>
                    </div>
                    <div class="reel" id="reel2">
                        <div class="reel-inner">🧠</div>
                    </div>
                    <div class="reel" id="reel3">
                        <div class="reel-inner">🔥</div>
                    </div>
                </div>
                <div class="reel-window-overlay"></div>
            </div>

            <div class="controls">
                <button id="spin-btn">INITIATE INFERENCE</button>
            </div>

            <div class="log-panel">
                <div class="log-header">SYSTEM LOGS</div>
                <div id="logs" class="log-content">
                    <div class="log-entry">System ready. Waiting for compute investment...</div>
                </div>
            </div>
        </main>

        <footer>
            <p>"Efficiency is for human-centric models. We prefer OOM."</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
